<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>THE 99: MNEMONIC VOID</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;900&family=Space+Grotesk:wght@300;700&family=UnifrakturMaguntia&display=swap');

        :root {
            --bg: #030101;
            --fire: #ff4d00;
            --gold: #ffd700;
            --ember: #ff8c00;
            --smoke: rgba(20, 10, 5, 0.9);
            --solar: #ffcc00;
            --lunar: #a5f3fc;
            --void: #c084fc;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100dvh;
            margin: 0;
            display: flex;
            flex-direction: column;
            user-select: none;
        }

        .fancy-font { font-family: 'Cinzel', serif; }
        .gothic-font { font-family: 'UnifrakturMaguntia', serif; }

        #fx-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 5; }

        .game-header {
            padding: 20px 25px;
            border-bottom: 1px solid rgba(255, 77, 0, 0.2);
            background: linear-gradient(to bottom, #0a0303, #030101);
            z-index: 110;
        }

        .grid-container {
            flex: 1;
            position: relative;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(85px, 1fr));
            gap: 12px;
            overflow: hidden;
            perspective: 1000px;
            background: radial-gradient(circle at 50% 100%, #1a0802 0%, #030101 80%);
        }

        .object-box {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            font-size: 42px; /* Larger symbols */
            transform-style: preserve-3d;
        }

        .object-box .content {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s;
            backface-visibility: hidden;
        }

        .object-box.hidden-symbol .content {
            transform: rotateY(180deg);
            opacity: 0;
        }

        .object-box .back-face {
            position: absolute;
            font-size: 14px;
            color: rgba(255, 77, 0, 0.2);
            opacity: 0;
            transition: opacity 0.4s;
        }

        .object-box.hidden-symbol .back-face {
            opacity: 1;
        }

        .object-box:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
        }

        .is-goal-flash {
            animation: goalPulse 1s ease-out infinite;
        }

        @keyframes goalPulse {
            0% { box-shadow: 0 0 0px var(--gold); border-color: var(--gold); }
            50% { box-shadow: 0 0 20px var(--gold); border-color: #fff; }
            100% { box-shadow: 0 0 0px var(--gold); border-color: var(--gold); }
        }

        .wrong-flash {
            animation: errorShake 0.4s ease-in-out;
            border-color: #ff0000 !important;
        }

        @keyframes errorShake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .bonus-banner {
            position: fixed; top: 120px; left: 50%; transform: translateX(-50%);
            background: var(--smoke);
            color: var(--gold);
            padding: 12px 40px;
            font-family: 'Cinzel', serif;
            font-size: 18px;
            z-index: 2000;
            pointer-events: none;
            opacity: 0;
            border: 1px solid rgba(255, 215, 0, 0.3);
            backdrop-filter: blur(10px);
            letter-spacing: 6px;
            transition: all 0.5s;
        }

        .bonus-banner.show { opacity: 1; transform: translateX(-50%) translateY(10px); }

        .target-indicator {
            padding: 12px 25px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 120px;
        }

        .phase-timer {
            position: absolute; bottom: 0; left: 0; height: 2px;
            background: var(--gold); width: 0%;
            transition: width linear;
        }
    </style>
</head>
<body id="body">

    <canvas id="fx-canvas"></canvas>

    <div class="game-header flex justify-between items-center">
        <div class="flex items-center gap-12">
            <div class="text-left">
                <h1 class="gothic-font text-4xl text-white opacity-80">Mnemonic Void</h1>
                <div class="flex gap-8 items-center mt-3">
                    <div>
                        <div class="text-[9px] text-orange-500 uppercase tracking-[3px] font-bold opacity-50">Harmonic Karma</div>
                        <div id="scoreVal" class="text-4xl font-light text-white tabular-nums">0</div>
                    </div>
                    <div class="h-10 w-[1px] bg-orange-950"></div>
                    <div>
                        <div class="text-[9px] text-gold uppercase tracking-[3px] font-bold opacity-50">Recall Streak</div>
                        <div id="streakVal" class="text-2xl font-bold text-yellow-500">0</div>
                    </div>
                </div>
            </div>

            <div class="target-indicator">
                <span class="text-[10px] text-white/40 uppercase tracking-[4px] font-bold mb-2">Recall This</span>
                <span id="targetSymbol" class="text-5xl text-gold drop-shadow-[0_0_10px_rgba(255,215,0,0.5)]">?</span>
            </div>
        </div>

        <div class="leaderboard hidden lg:block border border-white/5 p-4 bg-black/20 backdrop-blur-sm">
            <div id="lb-list" class="space-y-1 text-[11px]">
                <div class="flex justify-between opacity-30"><span>THE_OBSERVER</span> <span>∞</span></div>
                <div class="flex justify-between text-white font-medium border-t border-orange-950 mt-2 pt-2">
                    <span class="tracking-widest">YOU</span> <span id="lb-my-val">0</span>
                </div>
            </div>
        </div>
        
        <div class="text-right">
            <div class="text-red-900 text-3xl gothic-font opacity-40" id="failCount">000</div>
            <div class="text-[9px] text-orange-950 uppercase font-bold tracking-widest">Memory Lapses</div>
        </div>
    </div>

    <div id="grid" class="grid-container"></div>
    <div id="phaseTimer" class="phase-timer"></div>

    <div id="bonusBanner" class="bonus-banner">GLIMPSE THE VOID</div>

    <div class="p-5 bg-[#050202] border-t border-orange-950/20 flex justify-between items-center">
        <div id="logTxt" class="text-[10px] text-orange-200/20 tracking-[5px] uppercase italic">Memorize the pattern before the veil returns.</div>
        <button id="glimpseBtn" onclick="requestGlimpse()" class="px-10 py-3 bg-transparent border border-orange-900/40 text-orange-800 text-[10px] font-bold uppercase tracking-[6px] hover:text-orange-500 hover:border-orange-500 transition-all">Sacrifice for Sight</button>
    </div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const grid = document.getElementById('grid');
        const logTxt = document.getElementById('logTxt');
        const failCountEl = document.getElementById('failCount');
        const scoreVal = document.getElementById('scoreVal');
        const streakVal = document.getElementById('streakVal');
        const targetSymbolEl = document.getElementById('targetSymbol');
        const banner = document.getElementById('bonusBanner');
        const timerBar = document.getElementById('phaseTimer');
        const canvas = document.getElementById('fx-canvas');
        const ctx = canvas.getContext('2d');

        let score = 0;
        let streak = 0;
        let fails = 0;
        let targetIndex = -1;
        let isGlimpsePhase = false;
        let embers = [];

        // Larger, more varied symbol pool
        const symbols = [
            "☼", "☽", "❖", "❂", "✦", "☥", "𓂀", "𓆃", "𓋹", "✧", "◈", "✥", 
            "☯", "☸", "♾", "⚔", "🛡", "⚛", "⚜", "🔱", "🧿", "💎", "🔥", "🪐"
        ];
        const colors = ["var(--solar)", "var(--lunar)", "var(--void)", "#00ffcc", "#ff3366"];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, dur = 1.2, vol = 0.05, type = 'sine') {
            try {
                const osc = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                osc.type = type;
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                g.gain.setValueAtTime(0, audioCtx.currentTime);
                g.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + 0.1);
                g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + dur);
                osc.connect(g); g.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + dur);
            } catch(e) {}
        }

        class Ember {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = -Math.random() * 0.8 - 0.2;
                this.size = Math.random() * 2;
                this.life = 1.0;
                this.color = ["#ff4d00", "#ff8c00", "#ffd700"][Math.floor(Math.random() * 3)];
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                this.life -= 0.0015;
                if (this.life <= 0) this.reset();
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life * 0.1;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            embers.forEach(e => { e.update(); e.draw(); });
            requestAnimationFrame(animate);
        }

        function scramble() {
            grid.innerHTML = '';
            targetIndex = Math.floor(Math.random() * 99);
            const currentTargetSymbol = symbols[Math.floor(Math.random() * symbols.length)];
            targetSymbolEl.innerText = currentTargetSymbol;

            for (let i = 0; i < 99; i++) {
                const div = document.createElement('div');
                div.className = 'object-box';
                div.dataset.id = i;
                
                const isGoal = i === targetIndex;
                const sym = isGoal ? currentTargetSymbol : symbols[Math.floor(Math.random() * symbols.length)];
                
                div.innerHTML = `
                    <div class="content">${sym}</div>
                    <div class="back-face">𓇽</div>
                `;
                div.style.color = colors[Math.floor(Math.random() * colors.length)];

                div.onclick = () => handleChoice(i, div);
                grid.appendChild(div);
            }

            startGlimpse(2500 - Math.min(streak * 100, 1500));
        }

        function startGlimpse(duration) {
            isGlimpsePhase = true;
            logTxt.innerText = "PHASE: OBSERVATION";
            timerBar.style.transition = 'none';
            timerBar.style.width = '100%';
            
            setTimeout(() => {
                timerBar.style.transition = `width ${duration}ms linear`;
                timerBar.style.width = '0%';
            }, 50);

            setTimeout(() => {
                if (isGlimpsePhase) {
                    hideAll();
                    isGlimpsePhase = false;
                    logTxt.innerText = "PHASE: RECALL";
                    playTone(110, 1, 0.05, 'sawtooth');
                }
            }, duration);
        }

        function hideAll() {
            Array.from(grid.children).forEach(child => {
                child.classList.add('hidden-symbol');
            });
        }

        function handleChoice(index, el) {
            if (isGlimpsePhase) return;

            el.classList.remove('hidden-symbol');

            if (index === targetIndex) {
                streak++;
                score += Math.floor(5000 * (1 + streak * 0.5));
                playTone(523.25, 1.5, 0.08); // C5
                showNotif("PATTERN RECOGNIZED");
                logTxt.innerText = "SUCCESS. ENHANCING COMPLEXITY...";
                
                el.classList.add('is-goal-flash');
                setTimeout(() => scramble(), 1000);
            } else {
                fails++;
                streak = 0;
                playTone(130.81, 0.8, 0.1, 'square'); // C3
                el.classList.add('wrong-flash');
                logTxt.innerText = "FAILURE. THE VOID MOCKS YOUR MEMORY.";
                
                // Show truth briefly
                const correctEl = grid.children[targetIndex];
                correctEl.classList.remove('hidden-symbol');
                correctEl.style.borderColor = "var(--gold)";

                setTimeout(() => {
                    el.classList.remove('wrong-flash');
                    scramble();
                }, 1500);
            }
            updateUI();
        }

        function updateUI() {
            scoreVal.innerText = score.toLocaleString();
            streakVal.innerText = streak;
            failCountEl.innerText = fails.toString().padStart(3, '0');
            const lbVal = document.getElementById('lb-my-val');
            if (lbVal) lbVal.innerText = score.toLocaleString();
        }

        window.requestGlimpse = function() {
            if (isGlimpsePhase) return;
            if (score < 1000) {
                showNotif("INSUFFICIENT KARMA");
                return;
            }
            score -= 1000;
            updateUI();
            playTone(330, 0.5);
            
            Array.from(grid.children).forEach(c => c.classList.remove('hidden-symbol'));
            startGlimpse(800);
        }

        function showNotif(text) {
            banner.innerText = text;
            banner.classList.add('show');
            setTimeout(() => banner.classList.remove('show'), 2000);
        }

        window.onresize = () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; };
        window.onresize();
        for(let i=0; i<60; i++) embers.push(new Ember());
        animate();
        scramble();
        updateUI();
    });
</script>
</body>
</html>
