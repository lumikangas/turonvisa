<!DOCTYPE html>

<html lang="fi">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>COSMOS QUIZ</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">

<style>

  :root {

    --void: #03030f;

    --deep: #070720;

    --nebula1: #1a0533;

    --nebula2: #0d1a3a;

    --star: #e8f4ff;

    --glow: #7eb8ff;

    --accent: #ff6b35;

    --correct: #39ff85;

    --wrong: #ff3864;

    --gold: #ffd700;

  }





  * { box-sizing: border-box; margin: 0; padding: 0; }





  body {

    background: var(--void);

    color: var(--star);

    font-family: 'Exo 2', sans-serif;

    min-height: 100vh;

    overflow-x: hidden;

    display: flex;

    flex-direction: column;

    align-items: center;

    justify-content: center;

  }





  .stars {

    position: fixed;

    inset: 0;

    z-index: 0;

    pointer-events: none;

  }

  .star-dot {

    position: absolute;

    border-radius: 50%;

    background: white;

    animation: twinkle var(--d, 3s) infinite ease-in-out;

  }

  @keyframes twinkle {

    0%, 100% { opacity: 0.2; transform: scale(1); }

    50% { opacity: 1; transform: scale(1.4); }

  }





  .nebula {

    position: fixed;

    border-radius: 50%;

    filter: blur(80px);

    pointer-events: none;

    z-index: 0;

  }

  .nebula-a { width: 500px; height: 500px; background: radial-gradient(circle, #2d0b5580, transparent); top: -100px; left: -100px; }

  .nebula-b { width: 400px; height: 400px; background: radial-gradient(circle, #0a2a6060, transparent); bottom: -80px; right: -80px; }

  .nebula-c { width: 300px; height: 300px; background: radial-gradient(circle, #1a003380, transparent); top: 40%; left: 30%; }





  #app {

    position: relative;

    z-index: 1;

    width: 100%;

    max-width: 680px;

    padding: 20px;

    min-height: 100vh;

    display: flex;

    flex-direction: column;

    align-items: center;

    justify-content: center;

  }





  .screen { display: none; width: 100%; flex-direction: column; align-items: center; gap: 24px; animation: fadeIn 0.5s ease; }

  .screen.active { display: flex; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }





  .logo {

    font-family: 'Orbitron', monospace;

    font-size: clamp(2.5rem, 10vw, 4.5rem);

    font-weight: 900;

    letter-spacing: 0.15em;

    background: linear-gradient(135deg, var(--glow), var(--accent), var(--gold));

    -webkit-background-clip: text;

    -webkit-text-fill-color: transparent;

    background-clip: text;

    text-align: center;

    line-height: 1;

    filter: drop-shadow(0 0 30px rgba(126,184,255,0.4));

  }





  .tagline {

    font-size: 0.85rem;

    letter-spacing: 0.3em;

    text-transform: uppercase;

    color: rgba(232,244,255,0.5);

    text-align: center;

  }





  .card {

    background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));

    border: 1px solid rgba(126,184,255,0.15);

    border-radius: 20px;

    padding: 32px;

    width: 100%;

    backdrop-filter: blur(10px);

    box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);

  }





  .btn {

    font-family: 'Orbitron', monospace;

    font-size: 0.85rem;

    font-weight: 700;

    letter-spacing: 0.15em;

    padding: 14px 36px;

    border: none;

    border-radius: 50px;

    cursor: pointer;

    transition: all 0.2s ease;

    position: relative;

    overflow: hidden;

  }

  .btn::before {

    content: '';

    position: absolute;

    inset: 0;

    background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);

    opacity: 0;

    transition: opacity 0.2s;

  }

  .btn:hover::before { opacity: 1; }

  .btn:hover { transform: translateY(-2px); }

  .btn:active { transform: translateY(0); }





  .btn-primary {

    background: linear-gradient(135deg, #1a4a8a, #2d1a6e);

    color: var(--glow);

    border: 1px solid rgba(126,184,255,0.3);

    box-shadow: 0 4px 20px rgba(126,184,255,0.2);

  }

  .btn-primary:hover { box-shadow: 0 6px 30px rgba(126,184,255,0.4); }





  .btn-accent {

    background: linear-gradient(135deg, #c43a00, #8a2200);

    color: #fff;

    border: 1px solid rgba(255,107,53,0.3);

    box-shadow: 0 4px 20px rgba(255,107,53,0.2);

  }





  .topics-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; }

  .topic-btn {

    background: linear-gradient(135deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));

    border: 1px solid rgba(126,184,255,0.15);

    border-radius: 14px;

    padding: 16px 12px;

    cursor: pointer;

    transition: all 0.2s;

    text-align: center;

    color: var(--star);

    font-family: 'Exo 2', sans-serif;

  }

  .topic-btn:hover, .topic-btn.selected {

    border-color: var(--glow);

    background: rgba(126,184,255,0.1);

    box-shadow: 0 0 20px rgba(126,184,255,0.15);

    transform: translateY(-2px);

  }

  .topic-btn .icon { font-size: 1.8rem; display: block; margin-bottom: 6px; }

  .topic-btn .label { font-size: 0.8rem; font-weight: 600; letter-spacing: 0.05em; }





  .progress-bar-wrap {

    width: 100%;

    height: 4px;

    background: rgba(255,255,255,0.08);

    border-radius: 2px;

    overflow: hidden;

  }

  .progress-bar-fill {

    height: 100%;

    background: linear-gradient(90deg, var(--glow), var(--accent));

    border-radius: 2px;

    transition: width 0.4s ease;

    box-shadow: 0 0 8px var(--glow);

  }





  .question-meta {

    display: flex;

    justify-content: space-between;

    align-items: center;

    width: 100%;

    font-size: 0.75rem;

    color: rgba(232,244,255,0.5);

    letter-spacing: 0.1em;

  }





  .q-number { font-family: 'Orbitron', monospace; color: var(--glow); }

  .q-score { font-family: 'Orbitron', monospace; color: var(--gold); }





  .question-text {

    font-size: clamp(1rem, 3vw, 1.2rem);

    font-weight: 400;

    line-height: 1.6;

    color: var(--star);

    text-align: center;

    min-height: 80px;

    display: flex;

    align-items: center;

    justify-content: center;

  }





  .options { display: flex; flex-direction: column; gap: 10px; width: 100%; }

  .option-btn {

    background: rgba(255,255,255,0.03);

    border: 1px solid rgba(126,184,255,0.12);

    border-radius: 12px;

    padding: 14px 18px;

    color: rgba(232,244,255,0.85);

    font-family: 'Exo 2', sans-serif;

    font-size: 0.95rem;

    cursor: pointer;

    transition: all 0.18s ease;

    text-align: left;

    display: flex;

    align-items: center;

    gap: 12px;

  }

  .option-btn:hover:not(:disabled) {

    background: rgba(126,184,255,0.1);

    border-color: rgba(126,184,255,0.4);

    color: var(--star);

    transform: translateX(4px);

  }

  .option-btn .opt-letter {

    font-family: 'Orbitron', monospace;

    font-size: 0.7rem;

    font-weight: 700;

    color: rgba(126,184,255,0.6);

    min-width: 20px;

  }

  .option-btn.correct {

    background: rgba(57,255,133,0.12);

    border-color: var(--correct);

    color: var(--correct);

    box-shadow: 0 0 20px rgba(57,255,133,0.15);

  }

  .option-btn.wrong {

    background: rgba(255,56,100,0.1);

    border-color: var(--wrong);

    color: var(--wrong);

  }

  .option-btn:disabled { cursor: default; }





  .feedback {

    text-align: center;

    font-size: 0.85rem;

    padding: 12px;

    border-radius: 10px;

    opacity: 0;

    transition: opacity 0.3s;

    min-height: 44px;

    display: flex;

    align-items: center;

    justify-content: center;

    gap: 8px;

  }

  .feedback.visible { opacity: 1; }

  .feedback.correct-fb { background: rgba(57,255,133,0.08); color: var(--correct); }

  .feedback.wrong-fb { background: rgba(255,56,100,0.08); color: var(--wrong); }





  .loading-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 40px; }

  .orbit {

    width: 60px; height: 60px;

    border: 2px solid rgba(126,184,255,0.1);

    border-top-color: var(--glow);

    border-radius: 50%;

    animation: spin 0.8s linear infinite;

  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text { font-size: 0.8rem; letter-spacing: 0.2em; color: rgba(232,244,255,0.4); animation: pulse 1.5s ease infinite; }

  @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }





  .score-circle {

    width: 140px; height: 140px;

    border-radius: 50%;

    background: conic-gradient(var(--gold) var(--pct, 0%), rgba(255,255,255,0.05) 0%);

    display: flex; align-items: center; justify-content: center;

    position: relative;

    box-shadow: 0 0 40px rgba(255,215,0,0.2);

  }

  .score-circle::before {

    content: '';

    position: absolute;

    inset: 8px;

    background: var(--void);

    border-radius: 50%;

  }

  .score-inner {

    position: relative; z-index: 1;

    text-align: center;

  }

  .score-num { font-family: 'Orbitron', monospace; font-size: 2rem; font-weight: 900; color: var(--gold); }

  .score-total { font-size: 0.75rem; color: rgba(232,244,255,0.4); letter-spacing: 0.1em; }





  .result-title { font-family: 'Orbitron', monospace; font-size: 1.2rem; text-align: center; }

  .result-msg { font-size: 0.9rem; color: rgba(232,244,255,0.6); text-align: center; line-height: 1.6; }





  .stats-row { display: flex; gap: 24px; justify-content: center; }

  .stat-box { text-align: center; }

  .stat-val { font-family: 'Orbitron', monospace; font-size: 1.4rem; font-weight: 700; }

  .stat-label { font-size: 0.7rem; letter-spacing: 0.1em; color: rgba(232,244,255,0.4); margin-top: 2px; }





  .error-msg { color: var(--wrong); font-size: 0.85rem; text-align: center; padding: 12px; background: rgba(255,56,100,0.08); border-radius: 10px; border: 1px solid rgba(255,56,100,0.2); }





  h2 { font-family: 'Orbitron', monospace; font-size: 1rem; letter-spacing: 0.15em; color: rgba(232,244,255,0.7); }

  h3 { font-family: 'Orbitron', monospace; font-size: 0.85rem; letter-spacing: 0.1em; color: rgba(232,244,255,0.5); }

</style>

</head>

<body>





<div class="stars" id="stars"></div>

<div class="nebula nebula-a"></div>

<div class="nebula nebula-b"></div>

<div class="nebula nebula-c"></div>





<div id="app">





  <!-- HOME -->

  <div class="screen active" id="screen-home">

    <div class="logo">COSMOS<br>QUIZ</div>

    <p class="tagline">Testataan tietosi ✦ AI generoi kysymykset</p>

    <div class="card">

      <div style="display:flex;flex-direction:column;gap:20px;align-items:center">

        <h2>VALITSE AIHE</h2>

        <div class="topics-grid" id="topics-grid">

          <button class="topic-btn selected" data-topic="avaruus ja tähtitaivas"><span class="icon">🪐</span><span class="label">Avaruus</span></button>

          <button class="topic-btn" data-topic="historia ja arkeologia"><span class="icon">🏛️</span><span class="label">Historia</span></button>

          <button class="topic-btn" data-topic="luonto ja eläimet"><span class="icon">🌿</span><span class="label">Luonto</span></button>

          <button class="topic-btn" data-topic="tiede ja teknologia"><span class="icon">⚛️</span><span class="label">Tiede</span></button>

          <button class="topic-btn" data-topic="maantieto ja kulttuurit"><span class="icon">🌍</span><span class="label">Maantieto</span></button>

          <button class="topic-btn" data-topic="urheilu ja olympialaiset"><span class="icon">🏅</span><span class="label">Urheilu</span></button>

        </div>

        <div style="display:flex;flex-direction:column;gap:10px;align-items:center;width:100%">

          <h3>KYSYMYKSIÄ</h3>

          <div style="display:flex;gap:10px">

            <button class="btn btn-primary" id="q5-btn" onclick="setQCount(5)" style="padding:10px 20px;font-size:0.75rem">5</button>

            <button class="btn btn-accent" id="q10-btn" onclick="setQCount(10)" style="padding:10px 20px;font-size:0.75rem">10</button>

            <button class="btn btn-primary" id="q15-btn" onclick="setQCount(15)" style="padding:10px 20px;font-size:0.75rem">15</button>

          </div>

        </div>

        <button class="btn btn-accent" onclick="startGame()" style="width:100%;max-width:280px">🚀 ALOITA PELI</button>

      </div>

    </div>

  </div>





  <!-- LOADING -->

  <div class="screen" id="screen-loading">

    <div class="logo" style="font-size:2rem">COSMOS QUIZ</div>

    <div class="card">

      <div class="loading-wrap">

        <div class="orbit"></div>

        <div class="loading-text" id="loading-text">GENEROIDAAN KYSYMYKSIÄ...</div>

      </div>

    </div>

  </div>





  <!-- QUIZ -->

  <div class="screen" id="screen-quiz">

    <div class="logo" style="font-size:1.5rem">COSMOS QUIZ</div>

    <div class="card">

      <div style="display:flex;flex-direction:column;gap:16px">

        <div class="question-meta">

          <span class="q-number" id="q-number">KYS 1/10</span>

          <span class="q-score" id="q-score">★ 0</span>

        </div>

        <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progress-fill" style="width:0%"></div></div>

        <div class="question-text" id="question-text">Ladataan...</div>

        <div class="options" id="options"></div>

        <div class="feedback" id="feedback"></div>

        <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" style="display:none;align-self:center">SEURAAVA →</button>

      </div>

    </div>

  </div>





  <!-- RESULTS -->

  <div class="screen" id="screen-results">

    <div class="logo" style="font-size:2rem">COSMOS QUIZ</div>

    <div class="card">

      <div style="display:flex;flex-direction:column;align-items:center;gap:24px">

        <div class="score-circle" id="score-circle">

          <div class="score-inner">

            <div class="score-num" id="final-score">0</div>

            <div class="score-total" id="final-total">/ 10</div>

          </div>

        </div>

        <div class="result-title" id="result-title">TULOS</div>

        <p class="result-msg" id="result-msg"></p>

        <div class="stats-row">

          <div class="stat-box">

            <div class="stat-val" id="stat-correct" style="color:var(--correct)">0</div>

            <div class="stat-label">OIKEIN</div>

          </div>

          <div class="stat-box">

            <div class="stat-val" id="stat-wrong" style="color:var(--wrong)">0</div>

            <div class="stat-label">VÄÄRIN</div>

          </div>

          <div class="stat-box">

            <div class="stat-val" id="stat-pct" style="color:var(--gold)">0%</div>

            <div class="stat-label">TARKKUUS</div>

          </div>

        </div>

        <div style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center">

          <button class="btn btn-accent" onclick="showScreen('screen-home')">🏠 ETUSIVU</button>

          <button class="btn btn-primary" onclick="replayGame()">🔄 UUDELLEEN</button>

        </div>

      </div>

    </div>

  </div>





</div>





<script>

const starsEl = document.getElementById('stars');

for (let i = 0; i < 150; i++) {

  const s = document.createElement('div');

  s.className = 'star-dot';

  const size = Math.random() * 2.5 + 0.5;

  s.style.cssText = `width:${size}px;height:${size}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;animation-delay:${(Math.random()*5).toFixed(1)}s`;

  starsEl.appendChild(s);

}





let selectedTopic = 'avaruus ja tähtitaivas';

let questionCount = 10;

let questions = [];

let currentQ = 0;

let score = 0;

let correct = 0;

let wrong = 0;





function showScreen(id) {

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));

  document.getElementById(id).classList.add('active');

}





function setQCount(n) {

  questionCount = n;

  ['q5-btn','q10-btn','q15-btn'].forEach(id => {

    document.getElementById(id).className = 'btn btn-primary';

  });

  document.getElementById(`q${n}-btn`).className = 'btn btn-accent';

}





document.getElementById('topics-grid').addEventListener('click', e => {

  const btn = e.target.closest('.topic-btn');

  if (!btn) return;

  document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('selected'));

  btn.classList.add('selected');

  selectedTopic = btn.dataset.topic;

});





async function startGame() {

  showScreen('screen-loading');

  try {

    questions = await fetchQuestions();

    currentQ = 0; score = 0; correct = 0; wrong = 0;

    showQuestion();

    showScreen('screen-quiz');

  } catch (err) {

    showScreen('screen-home');

    alert('Virhe kysymysten haussa. Tarkista yhteys ja yritä uudelleen.');

  }

}





async function replayGame() {

  showScreen('screen-loading');

  try {

    questions = await fetchQuestions();

    currentQ = 0; score = 0; correct = 0; wrong = 0;

    showQuestion();

    showScreen('screen-quiz');

  } catch {

    showScreen('screen-home');

  }

}





async function fetchQuestions() {

  const loadingMessages = [

    'GENEROIDAAN KYSYMYKSIÄ...',

    'SKANNATAAN TIETOKANTOJA...',

    'KALIBROIDAAN VISIIRI...',

    'LASKETAAN RATOJA...',

  ];

  let li = 0;

  const lt = setInterval(() => {

    document.getElementById('loading-text').textContent = loadingMessages[li++ % loadingMessages.length];

  }, 900);





  const prompt = `Luo ${questionCount} erilaista tietovisailukysymystä aiheesta: ${selectedTopic}.





Vastaa AINOASTAAN tässä JSON-muodossa, ei muuta tekstiä:

[

  {

    "q": "Kysymys suomeksi?",

    "options": ["Vaihtoehto A", "Vaihtoehto B", "Vaihtoehto C", "Vaihtoehto D"],

    "answer": 0,

    "explanation": "Lyhyt selitys miksi vastaus on oikein (max 1 lause)."

  }

]





Säännöt:

- answer = oikean vastauksen indeksi (0-3)

- Kaikki teksti suomeksi

- Vaikeustaso: vaihteleva, osa helppoja osa haastavia

- Vältä toistoa, tee monipuolisia kysymyksiä`;





  const response = await fetch("https://api.anthropic.com/v1/messages", {

    method: "POST",

    headers: { "Content-Type": "application/json" },

    body: JSON.stringify({

      model: "claude-sonnet-4-20250514",

      max_tokens: 2000,

      messages: [{ role: "user", content: prompt }]

    })

  });





  clearInterval(lt);





  if (!response.ok) throw new Error('API error');

  const data = await response.json();

  const text = data.content.map(b => b.text || '').join('');

  const clean = text.replace(/```json|```/g, '').trim();

  const parsed = JSON.parse(clean);

  return parsed;

}





function showQuestion() {

  const q = questions[currentQ];

  const total = questions.length;





  document.getElementById('q-number').textContent = `KYS ${currentQ+1}/${total}`;

  document.getElementById('q-score').textContent = `★ ${score}`;

  document.getElementById('progress-fill').style.width = `${(currentQ/total)*100}%`;

  document.getElementById('question-text').textContent = q.q;





  const opts = document.getElementById('options');

  opts.innerHTML = '';

  const letters = ['A','B','C','D'];

  q.options.forEach((opt, i) => {

    const btn = document.createElement('button');

    btn.className = 'option-btn';

    btn.innerHTML = `<span class="opt-letter">${letters[i]}</span>${opt}`;

    btn.onclick = () => selectAnswer(i);

    opts.appendChild(btn);

  });





  const fb = document.getElementById('feedback');

  fb.className = 'feedback';

  fb.textContent = '';

  document.getElementById('next-btn').style.display = 'none';

}





function selectAnswer(idx) {

  const q = questions[currentQ];

  const optBtns = document.querySelectorAll('.option-btn');

  optBtns.forEach(b => b.disabled = true);





  const fb = document.getElementById('feedback');

  if (idx === q.answer) {

    optBtns[idx].classList.add('correct');

    fb.className = 'feedback correct-fb visible';

    fb.innerHTML = `✓ Oikein! ${q.explanation || ''}`;

    score += 10;

    correct++;

  } else {

    optBtns[idx].classList.add('wrong');

    optBtns[q.answer].classList.add('correct');

    fb.className = 'feedback wrong-fb visible';

    fb.innerHTML = `✗ Väärin. ${q.explanation || ''}`;

    wrong++;

  }

  document.getElementById('q-score').textContent = `★ ${score}`;





  const nextBtn = document.getElementById('next-btn');

  nextBtn.style.display = 'inline-block';

  nextBtn.textContent = currentQ + 1 < questions.length ? 'SEURAAVA →' : 'TULOKSET →';

}





function nextQuestion() {

  currentQ++;

  if (currentQ < questions.length) {

    showQuestion();

  } else {

    showResults();

  }

}





function showResults() {

  const total = questions.length;

  const pct = Math.round((correct / total) * 100);





  document.getElementById('final-score').textContent = correct;

  document.getElementById('final-total').textContent = `/ ${total}`;

  document.getElementById('stat-correct').textContent = correct;

  document.getElementById('stat-wrong').textContent = wrong;

  document.getElementById('stat-pct').textContent = pct + '%';





  const circle = document.getElementById('score-circle');

  circle.style.setProperty('--pct', `${pct}%`);





  let title, msg;

  if (pct === 100) { title = '🌟 TÄYDELLINEN!'; msg = 'Poikkeuksellinen suoritus. Olet todellinen tiedon mestari!'; }

  else if (pct >= 80) { title = '🚀 LOISTAVA!'; msg = 'Hieno suoritus! Tietämyksesi on todella laajaa.'; }

  else if (pct >= 60) { title = '⭐ HYVÄ!'; msg = 'Kunnioitettava tulos. Pieniä aukkoja tiedossa, mutta perustat ovat vahvat.'; }

  else if (pct >= 40) { title = '🌙 KOHTUULLINEN'; msg = 'Jatkamalla oppimista sinusta voi tulla tietovisailun mestari!'; }

  else { title = '☄️ HARJOITUSTA...'; msg = 'Ei hätää — jokainen mestarikaan ei aloita huipulta. Yritä uudelleen!'; }





  document.getElementById('result-title').textContent = title;

  document.getElementById('result-msg').textContent = msg;





  showScreen('screen-results');

}





setQCount(10);

</script>

</html>
